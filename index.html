<!DOCTYPE html>
<html>
<head>
<title>Platformer Challenge List</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
}

.level{
background:#222;
margin:10px;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.details{
display:none;
margin-top:8px;
color:#ccc;
}
</style>

</head>

<body>

<h1>Platformer Challenge List</h1>

<div id="list"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6IIr-OJxwJIa329mwA13dsgfjHPBafz6TY1813MYjfP_lv-hPyc3LsIakov80NoAC6vxBr02di4Bh/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

const rows = data.split("\n").slice(1);
const container = document.getElementById("list");

rows.forEach(row => {

const cols = row.split(",");

const rank = cols[0];
const level = cols[1];
const creator = cols[2];
const difficulty = cols[3];
const verifier = cols[4];
const video = cols[5];

const box = document.createElement("div");
box.className = "level";

box.innerHTML = `
<b>#${rank} ${level}</b> by ${creator}

<div class="details">
Difficulty: ${difficulty}<br>
Verifier: ${verifier}<br>
<a href="${video}" target="_blank">Video</a>
</div>
`;

box.onclick = () => {
const details = box.querySelector(".details");
details.style.display =
details.style.display === "none" ? "block" : "none";
};

container.appendChild(box);

});

});

</script>

</body>
</html>
